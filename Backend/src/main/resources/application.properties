spring.application.name=school-backend

# Dynamic Port for Cloud Hosting (Railway requires the app to listen on the PORT environment variable)
server.port=${PORT:8080}

# MySQL Connection Settings
# Automatically detects Railway's native MySQL variables, falls back to custom env vars, then local defaults
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${DB_HOST:localhost}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_NAME:school_db}}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${DB_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pooling (HikariCP) - handles 300+ concurrent users without crashing
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Suppress the Spring Security auto-generated password warning
logging.level.org.springframework.security=WARN

# ── SECURITY: Request Size Limits ──────────────────────────────────────────────
# These prevent someone from sending a massive file/payload to crash the server.
# A normal form submission is a few KB — 2MB is already very generous.
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=1MB

# ── IMPORTANT FOR HOSTING ──────────────────────────────────────────────────────
# NEVER push this file to GitHub! It contains your database password.
# Add application.properties to your .gitignore file before pushing.
# On the hosting server, set DB_HOST, DB_NAME, DB_USER, DB_PASSWORD as
# environment variables instead of hardcoding them here.
