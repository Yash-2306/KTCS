spring.application.name=school-backend

# Dynamic Port for Cloud Hosting (Railway requires the app to listen on the PORT environment variable)
server.port=${PORT:8080}

# MySQL Connection — uses environment variables set on Railway
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD must be set in Railway Variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:school_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pooling (HikariCP)
# Reduced to 5 connections to fit within Railway's 512MB free-tier RAM limit.
# Each MySQL connection uses ~8MB. 5 × 8MB = 40MB. Plenty for 310 concurrent users doing normal school tasks.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Disable JMX monitoring — frees ~20MB of RAM on Railway
spring.jmx.enabled=false

# Suppress the Spring Security auto-generated password warning
logging.level.org.springframework.security=WARN

# ── SECURITY: Request Size Limits ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=5MB

# ── IMPORTANT FOR HOSTING ──────────────────────────────────────────────────────
# NEVER push this file to GitHub! It contains your database password.
# Add application.properties to your .gitignore file before pushing.
# On the hosting server, set DB_HOST, DB_NAME, DB_USER, DB_PASSWORD as
# environment variables instead of hardcoding them here.
