<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kriti The Concept School</title>
    <meta name="description" content="Staff and student portal login for Kriti The Concept School">
    <link rel="icon" href="Assets/images/KTCS_logo-removebg-preview.png">

    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase Auth (Compat SDK — works with regular script tags, no modules needed) -->
    <!-- Our shared Firebase config + authFetch helper -->
    <script src="auth.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A5F',
                        accent:  '#F5A623',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }

        .role-btn { transition: all 0.2s ease; }
        .role-btn.active { background: #1E3A5F; color: white; }

        .login-card {
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .input-field {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            color: #1a202c;
            font-family: 'Inter', sans-serif;
        }
        .input-field:focus { border-color: #1E3A5F; }

        .btn-login {
            width: 100%;
            background: #1E3A5F;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background: #F5A623; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gradient-to-br from-primary to-blue-900 min-h-screen flex items-center justify-center p-4">

    <!-- Security check - if already logged in redirect to correct dashboard -->
    <script>
        const existingRole = localStorage.getItem('role');
        if (existingRole === 'ADMIN')   window.location.href = 'admin-dashboard.html';
        if (existingRole === 'TEACHER') window.location.href = 'teacher-dashboard.html';
        if (existingRole === 'STUDENT') window.location.href = 'student-dashboard.html';
    </script>

    <div class="w-full max-w-md">

        <!-- Logo + School Name -->
        <div class="text-center mb-8">
            <img src="Assets/images/KTCS_logo-removebg-preview.png" alt="KTCS Logo" class="h-20 w-auto mx-auto mb-4">
            <h1 class="text-2xl font-bold text-white">Kriti – The Concept School</h1>
            <p class="text-blue-200 text-sm mt-1">Staff & Student Management Portal</p>
        </div>

        <!-- Login Card -->
        <div class="login-card bg-white rounded-2xl shadow-2xl p-5 sm:p-8">

            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">Sign In</h2>

            <!-- Role Selector -->
            <div class="flex rounded-xl overflow-hidden border border-gray-200 mb-6">
                <button onclick="setRole('student')" id="btn-student"
                    class="role-btn active flex-1 py-2.5 text-sm font-semibold transition">
                    Student
                </button>
                <button onclick="setRole('teacher')" id="btn-teacher"
                    class="role-btn flex-1 py-2.5 text-sm font-semibold transition text-gray-500 border-l border-gray-200">
                    Teacher
                </button>
                <button onclick="setRole('admin')" id="btn-admin"
                    class="role-btn flex-1 py-2.5 text-sm font-semibold transition text-gray-500 border-l border-gray-200">
                    Admin
                </button>
            </div>

            <!-- Username -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                <div class="relative">
                    <input type="text" id="username" placeholder="Enter your username"
                        class="input-field pl-10" autocomplete="username">
                    <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="width:16px;height:16px;"></i>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-2">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="Enter your password"
                        class="input-field pl-10 pr-10" autocomplete="current-password">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="width:16px;height:16px;"></i>
                    <button type="button" onclick="togglePassword()" id="toggle-pwd-btn"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition">
                        <i data-lucide="eye" id="toggle-pwd-icon" style="width:16px;height:16px;"></i>
                    </button>
                </div>
            </div>

            <!-- Error message -->
            <p id="error-msg" class="text-red-500 text-xs mt-2 mb-4 hidden flex items-center gap-1">
                <i data-lucide="alert-circle" style="width:13px;height:13px;"></i>
                <span id="error-text">Invalid username or password.</span>
            </p>

            <!-- Login Button -->
            <button id="login-btn" onclick="handleLogin()" class="btn-login mt-4">
                <i data-lucide="log-in" style="width:16px;height:16px;"></i>
                Sign In
            </button>

            <!-- Back link -->
            <div class="text-center mt-5">
                <a href="index.html" class="text-sm text-gray-400 hover:text-primary transition">
                    &larr; Back to website
                </a>
            </div>
        </div>

        <p class="text-center text-blue-200 text-xs mt-5">
            &copy; 2026 Kriti &ndash; The Concept School
        </p>
    </div>

    <script>
        // ─── CONFIG ────────────────────────────────────────────────────────────
        const API_BASE = 'https://ktcs-backend-production.up.railway.app';

        // ─── STATE ─────────────────────────────────────────────────────────────
        let selectedRole = 'student';
        let isLoading    = false;

        // ─── INIT ──────────────────────────────────────────────────────────────
        window.onload = function() {
            lucide.createIcons();
        };

        // ─── ROLE SWITCHER ─────────────────────────────────────────────────────
        function setRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-primary', 'text-white');
                btn.classList.add('text-gray-500');
            });
            const btn = document.getElementById('btn-' + role);
            btn.classList.add('active');
            btn.classList.remove('text-gray-500');
        }

        // ─── PASSWORD TOGGLE ───────────────────────────────────────────────────
        function togglePassword() {
            const pwd  = document.getElementById('password');
            const icon = document.getElementById('toggle-pwd-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwd.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // ─── SHOW / HIDE ERROR ─────────────────────────────────────────────────
        function showError(msg) {
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').classList.remove('hidden');
            lucide.createIcons();
        }
        function hideError() {
            document.getElementById('error-msg').classList.add('hidden');
        }

        // ─── LOGIN ─────────────────────────────────────────────────────────────
        async function handleLogin() {
            if (isLoading) return;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            hideError();

            if (!username || !password) {
                showError('Please enter your username and password.');
                return;
            }

            isLoading = true;
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle" style="width:16px;height:16px;"></i> Signing in...';
            lucide.createIcons();

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: selectedRole.toUpperCase() })
                });

                const data = await response.json();

                if (response.ok && data.status === 'SUCCESS') {
                    // Save the JWT token — auth.js reads this and adds it to every API call
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userId',    data.userId);
                    localStorage.setItem('username',  data.username);
                    localStorage.setItem('role',      data.role);
                    localStorage.setItem('fullName',  data.fullName);

                    if      (data.role === 'ADMIN')   window.location.href = 'admin-dashboard.html';
                    else if (data.role === 'TEACHER') window.location.href = 'teacher-dashboard.html';
                    else if (data.role === 'STUDENT') window.location.href = 'student-dashboard.html';
                } else {
                    showError(data.message || 'Invalid username, password, or role.');
                }

            } catch (err) {
                showError('Cannot connect to server. Make sure the backend is running.');
                console.error('Login error:', err);
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Sign In';
                lucide.createIcons();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            ['username', 'password'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') handleLogin();
                });
            });
        });
        (async function() {
            try {
                const apiBase = 'https://ktcs-backend-production.up.railway.app';
                await fetch(`${apiBase}/api/visitors/hit?page=DASHBOARDS`, { method: 'POST' });
            } catch(e) {}
        })();
    </script>
</body>
</html>
